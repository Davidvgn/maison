<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#d56fae" />
<title>Ma journée — Nina</title>
<link rel="stylesheet" href="chores.css" />
</head>
<body>
<header>
  <p class="hello" id="hello">Salut 👋</p>
  <p class="today-day" id="dayName">—</p>
  <p class="today-date" id="dateLine">—</p>
  <div class="school-row">
    <div class="chip" id="chipToday"><span class="lbl">Aujourd'hui</span><span class="val" id="schoolToday">—</span></div>
    <div class="chip" id="chipTomorrow"><span class="lbl">Demain</span><span class="val" id="schoolTomorrow">—</span></div>
  </div>
</header>

<div id="vacBanner" class="vac-banner"></div>

<div class="progress-wrap">
  <div class="progress-top"><span id="progressText">0 / 0 fait</span><b id="progressPct">0%</b></div>
  <div class="bar"><span id="progressBar"></span></div>
</div>

<div id="celebrate" class="celebrate">
  <div class="big">🎉</div>
  <div class="msg" id="celebrateMsg">Bravo, tout est fait&nbsp;!</div>
</div>

<main id="blocks"></main>
<section id="rules" class="rules"></section>

<footer>
  Ma journée se remet à zéro toute seule chaque matin.
  <br /><span class="draft">PROTOTYPE — pictos provisoires (emojis), à remplacer par des images</span>
</footer>

<script>
window.CHILD_CONFIG = {
  key: "nina",
  name: "Nina",
  gradient: "linear-gradient(135deg,#d56fae,#ef9ad0)",
  schoolWeekdays: [1,2,4,5],   // lundi, mardi, jeudi, vendredi
  hairDays: [3,0],             // cheveux : mercredi + dimanche
  toiletteNote: "Me laver les mains et le visage", // pas de déo (8 ans) — à ajuster si besoin
  eveningExtra: [
    {emoji:"🍽️", label:"Débarrasser la table", note:"Avec Liam"},
    {emoji:"🌸", label:"Mettre du Febreze (rideaux + maison)", note:"Ma tâche · provisoire : samedi", days:[6]}
  ]
};
</script>
<script>var _s=document.createElement('script');_s.src='chores.js?t='+Date.now();document.body.appendChild(_s);</script>
</body>
</html>
